name: ssm

# Local dev + small-prod single-host deployment.
# For multi-host or high-availability, split Postgres/Redis onto managed services
# and run `api`/`worker` on separate hosts.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shm
      POSTGRES_PASSWORD: shm
      POSTGRES_DB: shm
    # No host port mapping: api/worker reach postgres via the compose network.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shm -d shm"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 320m

  migrate:
    # One-shot container that runs the SQL migrations, then exits.
    image: ssm-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    entrypoint: ["node", "dist/db/migrate.js"]
    restart: "no"

  api:
    image: ssm-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SHIM_MODE: api
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
    # Bind only on host loopback; Caddy on the host reverse-proxies to this.
    ports:
      - "127.0.0.1:8080:8080"
    mem_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8080/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    image: ssm-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SHIM_MODE: worker
    # Worker makes outbound calls to cameras; no need for host port binding.
    healthcheck:
      disable: true
    mem_limit: 384m

volumes:
  pgdata:
  redisdata:
